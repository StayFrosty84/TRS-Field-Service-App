name: Deploy stable + beta to GitHub Pages

# One Pages site, two channels rebuilt every run so neither overwrites the other:
#   /stable/  <- the latest *full* GitHub Release (prereleases excluded)
#   /beta/    <- main (bleeding edge)
#   /         <- landing page linking both
on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # all branches + tags, so release tags are buildable
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build both channels
        run: |
          set -euo pipefail
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          STABLE_TAG="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)"
          echo "Stable channel builds from latest release: ${STABLE_TAG}"

          build() { # $1 = git ref, $2 = channel name
            local ref="$1" channel="$2"
            git worktree add "../b-${channel}" "${ref}"
            ( cd "../b-${channel}" \
              && npm install \
              && npm run icons \
              && VITE_BASE="/${REPO_NAME}/${channel}/" npm run build )
            mkdir -p "site/${channel}"
            cp -r "../b-${channel}/dist/." "site/${channel}/"
          }

          build "${STABLE_TAG}" stable
          build "HEAD"          beta
          cp landing/index.html site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
