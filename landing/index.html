<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Field Service — Choose a version</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0b1220;
        color: #e2e8f0;
      }
      main { width: 100%; max-width: 30rem; text-align: center; }
      h1 { font-size: 1.6rem; margin: 0 0 0.25rem; }
      p.sub { margin: 0 0 2rem; color: #94a3b8; }
      .cards { display: grid; gap: 1rem; }
      a.card {
        display: block;
        text-decoration: none;
        text-align: left;
        padding: 1.1rem 1.25rem;
        border-radius: 0.9rem;
        background: #0f1b2d;
        border: 1px solid #1e293b;
        color: inherit;
        transition: border-color 0.15s, transform 0.15s;
      }
      a.card:hover { border-color: #0f766e; transform: translateY(-2px); }
      .row { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
      .name { font-size: 1.15rem; font-weight: 600; }
      .tag {
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        padding: 0.15rem 0.5rem;
        border-radius: 999px;
      }
      .tag.stable { background: #134e4a; color: #5eead4; }
      .tag.beta { background: #3b2f0b; color: #fde68a; }
      .desc { margin: 0.4rem 0 0; color: #94a3b8; font-size: 0.9rem; }
      footer { margin-top: 2rem; font-size: 0.8rem; color: #475569; }
      footer a { color: #64748b; }
    </style>
  </head>
  <body>
    <main>
      <h1>Field Service</h1>
      <p class="sub">Work orders, bills of sale &amp; CRM — offline-first PWA.</p>
      <div class="cards">
        <a class="card" href="./stable/">
          <div class="row">
            <span class="name">Stable</span>
            <span class="tag stable">Recommended</span>
          </div>
          <p class="desc">The tested release. Use this for day-to-day work.</p>
        </a>
        <a class="card" href="./beta/">
          <div class="row">
            <span class="name">Beta</span>
            <span class="tag beta">Bleeding edge</span>
          </div>
          <p class="desc">Latest features in progress. May change or break.</p>
        </a>
      </div>
      <footer>
        <a href="https://github.com/StayFrosty84/TRS-Field-Service-App">Source on GitHub</a>
      </footer>
    </main>
  </body>
</html>
